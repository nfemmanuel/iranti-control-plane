version: '3.8'
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: iranti
      POSTGRES_USER: iranti
      POSTGRES_PASSWORD: iranti
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iranti"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
