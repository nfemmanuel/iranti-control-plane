name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            src/client/package.json
            src/server/package.json

      - name: Install client deps
        run: npm install --prefix src/client

      - name: Install server deps
        run: npm install --prefix src/server

      - name: Type check client
        run: cd src/client && npx tsc --noEmit

      - name: Type check server
        run: cd src/server && npx tsc --noEmit

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            src/client/package.json
            src/server/package.json

      - name: Install client deps
        run: npm install --prefix src/client

      - name: Install server deps
        run: npm install --prefix src/server

      - name: Build client
        run: cd src/client && npm run build

      - name: Build server
        run: cd src/server && npm run build

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/server/package.json

      - name: Install server deps
        run: npm install --prefix src/server

      - name: Run unit tests
        run: cd src/server && npx vitest run tests/unit
