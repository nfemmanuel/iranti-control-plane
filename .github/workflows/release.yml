name: Release (source archive)

# NOTE: This workflow creates a source .tar.gz archive only.
# Platform installer packages (.exe, .dmg, .AppImage, .deb) are built and
# released by .github/workflows/package.yml, which also creates the GitHub
# Release. This workflow runs separately and does NOT create a GitHub Release
# to avoid conflicts with package.yml on the same tag.
# See CP-T048 ISSUE-2 in docs/qa/cp-t048-clean-machine-test-plan.md

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package.json
            src/client/package.json
            src/server/package.json

      - name: Install deps
        run: |
          npm install
          npm install --prefix src/client
          npm install --prefix src/server

      - name: Build everything
        run: |
          cd src/client && npm run build
          cd ../server && npm run build

      - name: Create release archive
        run: |
          mkdir -p release
          cp -r src/server/dist release/server
          cp -r public/control-plane release/client
          cp package.json release/package.json
          tar -czf iranti-control-plane-${{ github.ref_name }}.tar.gz release/

      # Upload the source archive as an artifact only — do NOT create a GitHub
      # Release here. The platform installer workflow (package.yml) owns release
      # creation. Uploading here via upload-artifact makes the archive available
      # for CI inspection without conflicting with package.yml's release job.
      - uses: actions/upload-artifact@v4
        with:
          name: source-archive
          path: iranti-control-plane-*.tar.gz
          retention-days: 30
